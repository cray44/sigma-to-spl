title: LSASS Process Access for Credential Dumping
id: b2e4f6a8-3c5d-7e9f-a1b2-4c6d8e0f2a3b
status: experimental
description: >
  Detects suspicious process access to LSASS (Local Security Authority Subsystem
  Service) indicative of credential dumping. Sysmon Event ID 10 (ProcessAccess)
  records when a process opens a handle to another process. Access to lsass.exe
  with memory-read permissions (0x10, 0x1010, 0x1038) is the mechanism underlying
  Mimikatz sekurlsa::logonpasswords, ProcDump-based LSASS dumps, and comsvcs.dll
  MiniDump abuse. Used by virtually every tracked threat group performing
  post-compromise credential access.
references:
  - https://attack.mitre.org/techniques/T1003/001/
  - https://www.elastic.co/blog/how-attackers-dump-active-directory-database-credentials
  - https://blog.menasec.net/2019/02/threat-hunting-21-detecting-dumping-of.html
author: Chris Ray
date: 2026-04-29
tags:
  - attack.credential-access
  - attack.t1003.001
logsource:
  product: windows
  category: process_access
  definition: Requires Sysmon with Event ID 10 (ProcessAccess) configured. TargetImage filter on lsass.exe is required.
detection:
  selection_target:
    TargetImage|endswith: '\lsass.exe'
  selection_access_rights:
    GrantedAccess|contains:
      - '0x1010'
      - '0x1038'
      - '0x40'
      - '0x1fffff'
      - '0x1f1fff'
      - '0x143a'
  filter_known_good:
    SourceImage|contains:
      - '\MsMpEng.exe'
      - '\MsSense.exe'
      - '\SenseIR.exe'
      - '\WinDefend\MpCmdRun.exe'
      - '\CylanceSvc.exe'
      - '\csrss.exe'
      - '\wininit.exe'
      - '\svchost.exe'
  condition: selection_target and selection_access_rights and not filter_known_good
  # NOTE: GrantedAccess values in Sigma are matched as string substrings against
  # the hex representation logged by Sysmon. The SPL below normalizes the value
  # to integer for range-based scoring and adds CallTrace analysis to distinguish
  # ntdll-only benign access from unknown-module access indicative of injection.
  # The SPL also handles the 0x10 (PROCESS_VM_READ alone) and combinations not
  # expressible as Sigma string conditions.
falsepositives:
  - Antivirus and EDR agents that read LSASS memory for protection (add to allowlist by SourceImage path)
  - Windows Defender Credential Guard components
  - Legitimate administrative tools (Process Explorer, Process Monitor) during authorized troubleshooting
  - Automated backup or snapshot agents on domain controllers
level: high
