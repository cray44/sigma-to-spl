title: OAuth Device Code Phishing - Suspicious Device Authorization Flow
id: b3f7c2d1-8e4a-4f9b-a1c5-2d6e8f0b3a7c
status: experimental
description: >
  Detects OAuth 2.0 device authorization grant flows that exhibit indicators of
  phishing abuse: browser-based user agents completing device code authentication
  (legitimate device code clients are non-browser), or successful device code
  authentication from unmanaged/unregistered devices. Used by APT29 (Midnight
  Blizzard) and Storm-0867 to bypass MFA and steal OAuth tokens.
references:
  - https://attack.mitre.org/techniques/T1528/
  - https://www.microsoft.com/en-us/security/blog/2025/01/31/new-ttps-observed-in-midnight-blizzard-attacks/
  - https://www.rfc-editor.org/rfc/rfc8628
author: Chris Ray
date: 2026-04-29
tags:
  - attack.initial-access
  - attack.t1566.002
  - attack.credential-access
  - attack.t1528
  - attack.t1078.004
logsource:
  product: azure
  service: azure_ad
  definition: Requires Entra ID Sign-in logs forwarded to Splunk via Microsoft Azure Active Directory Add-on (sourcetype azure:aad:signin)
detection:
  selection_device_code:
    AuthenticationProtocol: deviceCode
    ResultType: '0'
  filter_managed_device:
    DeviceDetail.isCompliant: 'True'
  condition: selection_device_code and not filter_managed_device
fields:
  - UserPrincipalName
  - UserDisplayName
  - IPAddress
  - UserAgent
  - AppDisplayName
  - DeviceDetail.deviceId
  - DeviceDetail.isCompliant
  - Location.city
  - Location.countryOrRegion
falsepositives:
  - Azure CLI, Azure PowerShell, VS Code Azure extensions authenticating from unmanaged devices
  - Microsoft Teams Rooms and Surface Hub devices
  - Employees using cloud CLI tools from personal (unmanaged) devices
  - CI/CD pipelines using device code flow from build agents
level: medium
# NOTE: The SPL production query adds browser UA detection (HIGH risk tier) and
# geographic anomaly correlation not expressible in Sigma condition syntax.
# See detection writeup for full SPL with risk scoring.
