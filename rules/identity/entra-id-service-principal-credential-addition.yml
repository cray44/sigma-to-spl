title: Entra ID Service Principal Credential Addition
id: b7c2d4e8-5f9a-4b3c-8d1e-2f6a7b8c9d0e
status: experimental
description: Detects when a credential (password or certificate) is added to an Entra ID service principal by an interactive user, indicating potential persistence via backdoored OAuth application
references:
    - https://attack.mitre.org/techniques/T1098/001/
    - https://www.cisa.gov/news-events/cybersecurity-advisories/aa21-008a
    - https://github.com/cray44/detection-notes/blob/main/detections/identity/entra-id-service-principal-credential-addition/entra-id-service-principal-credential-addition.md
author: Chris Ray
date: 2026-04-30
tags:
    - attack.persistence
    - attack.privilege-escalation
    - attack.t1098.001
logsource:
    product: azure
    service: auditlogs
detection:
    selection:
        operationName: Add service principal credentials
        result: success
    filter_automated:
        properties.initiatedBy.user.userPrincipalName: ''
    condition: selection and not filter_automated
falsepositives:
    - Automated DevOps pipelines rotating service principal credentials
    - IT administrators manually rotating compromised secrets
    - Azure Key Vault automated credential rotation
level: medium
